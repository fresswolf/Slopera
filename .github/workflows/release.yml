name: Build & Release

# Build the Windows installers/zips on a native Windows runner (no Wine needed),
# upload them as artifacts on every run, and attach them to a GitHub Release when
# a v* tag is pushed.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release on tag pushes

jobs:
  # Cheap gate — fail fast before spinning up the heavier OS runners.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Native Windows runner: electron-builder produces NSIS installers directly,
      # no Wine. Builds x64 + arm64, each as an installer (nsis) and a zip.
      - name: Package Windows (x64 + arm64)
        run: npx electron-builder --win nsis zip --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: slopera-windows
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

  release:
    # Only when a v* tag is pushed. Pulls the built artifacts and publishes them.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: slopera-windows
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          draft: true # review before publishing; flip to false to auto-publish
          files: dist/*
