name: Build & Release

# Build the per-platform installers on native runners (Windows installers need no
# Wine; macOS dmg needs a mac runner to sign/notarize later), upload them as
# artifacts on every run, and attach them to a GitHub Release when a v* tag is pushed.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release on tag pushes

jobs:
  # Cheap gate — fail fast before spinning up the heavier OS runners.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  windows:
    needs: check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # Native Windows runner: electron-builder produces NSIS installers directly,
      # no Wine. Builds x64 + arm64, each as an installer (nsis) and a zip.
      - name: Package Windows (x64 + arm64)
        run: npx electron-builder --win nsis zip --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v7
        with:
          name: slopera-windows
          path: |
            release/*.exe
            release/*.zip
          if-no-files-found: error

  macos:
    needs: check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # macos-latest is arm64; electron-builder cross-builds the x64 dmg by pulling
      # the x64 Electron. Signing + notarization run when the secrets are present
      # (repo pushes/tags); fork PRs get no secrets and fall back to unsigned.
      - name: Package macOS (x64 + arm64)
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never
        env:
          # base64-encoded Developer ID Application .p12 + its export password
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # notarization (notarytool via @electron/notarize)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - uses: actions/upload-artifact@v7
        with:
          name: slopera-macos
          path: release/*.dmg
          if-no-files-found: error

  linux:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Package Linux (AppImage, x64 + arm64)
        run: npx electron-builder --linux AppImage --x64 --arm64 --publish never
      # electron-builder embeds an old dynamically-linked AppImage runtime whose
      # arm64 build needs the unversioned libz.so (shipped only in zlib1g-dev).
      # Splice in the statically-linked type2-runtime instead; it also drops the
      # libfuse2 requirement (needs only fusermount3, default on modern distros).
      # An AppImage is the runtime ELF with a squashfs appended at the runtime's
      # ELF-computed size, so the swap is: cut at the old runtime's size, verify
      # the squashfs magic, prepend the new runtime.
      - name: Swap in static AppImage runtime
        run: |
          set -euo pipefail
          for arch in x86_64 aarch64; do
            curl -fsSLo "runtime-$arch" "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-$arch"
          done
          for img in release/*.AppImage; do
            case "$img" in *arm64*) rt=runtime-aarch64 ;; *) rt=runtime-x86_64 ;; esac
            # squashfs offset = e_shoff + e_shentsize * e_shnum of the runtime ELF
            offset=$(python3 -c "import struct,sys;d=open(sys.argv[1],'rb').read(64);print(struct.unpack_from('<Q',d,0x28)[0]+struct.unpack_from('<H',d,0x3a)[0]*struct.unpack_from('<H',d,0x3c)[0])" "$img")
            python3 -c "import sys;f=open(sys.argv[1],'rb');f.seek(int(sys.argv[2]));assert f.read(4)==b'hsqs','squashfs not at expected offset in '+sys.argv[1]" "$img" "$offset"
            tail -c "+$((offset + 1))" "$img" | cat "$rt" - > "$img.tmp"
            mv "$img.tmp" "$img"
            chmod +x "$img"
          done
      # Prove the swapped runtime boots and can locate its payload (x64 only —
      # the arm64 binary can't execute on this runner).
      - name: Smoke-test x64 AppImage extraction
        run: |
          set -euo pipefail
          img=$(ls release/*.AppImage | grep -v arm64)
          workdir=$(mktemp -d)
          (cd "$workdir" && "$GITHUB_WORKSPACE/$img" --appimage-extract > /dev/null)
          test -x "$workdir/squashfs-root/AppRun"
      - uses: actions/upload-artifact@v7
        with:
          name: slopera-linux
          path: release/*.AppImage
          if-no-files-found: error

  release:
    # Only when a v* tag is pushed. Pulls every platform's artifacts and publishes them.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: slopera-*
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v3
        with:
          draft: false # auto-publish the Release on v* tag push
          files: dist/*
