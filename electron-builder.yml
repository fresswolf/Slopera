appId: dev.siegrist.slopera
productName: Slopera
directories:
  output: release
files:
  - out/**
  - package.json
mac:
  target: dmg
  category: public.app-category.entertainment
  # Signing identity comes from the keychain (CI imports it via CSC_LINK/CSC_KEY_PASSWORD).
  # Notarization creds come from APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID env vars;
  # when absent (local dev, fork PRs) electron-builder warns and produces an unsigned build.
  hardenedRuntime: true
  notarize: true
win:
  target: nsis
  # full-bleed art — Windows doesn't apply the macOS rounded mask/padding
  icon: build/icon-desktop.png
linux:
  target: AppImage
  category: Network
  icon: build/icon-desktop.png
# no native modules — sqlite comes from Electron's bundled node:sqlite
npmRebuild: false
